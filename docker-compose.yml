services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: topquizz
      POSTGRES_PASSWORD: topquizz
      POSTGRES_DB: topquizz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - topquizz
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U topquizz"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    networks:
      - topquizz
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://topquizz:topquizz@postgres:5432/topquizz
      - TOPQUIZZ_ADMIN_TOKEN=${TOPQUIZZ_ADMIN_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/app:/app/app
      - ./media:/app/media
    networks:
      - topquizz
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    networks:
      - topquizz
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    build: ./nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - topquizz
    restart: unless-stopped

networks:
  topquizz:
    driver: bridge

volumes:
  postgres_data:
